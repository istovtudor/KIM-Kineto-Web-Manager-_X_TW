<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - KIM</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
  <div class="auth-box">
    <h1>KIM - Login</h1>
    <div id="alert" class="alert hidden"></div>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="member@kim.ro">
      </div>
      <div class="form-group">
        <label for="password">Parola</label>
        <input type="password" id="password" required placeholder="member123">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Autentificare</button>
    </form>
    <p style="text-align:center;margin-top:1rem;font-size:.9rem">
      Nu ai cont? <a href="register.html">Inregistrare</a>
    </p>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
