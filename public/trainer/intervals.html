<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intervale antrenor - KIM</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="inner">
      <h1>KIM - Intervale orare</h1>
      <nav class="main-nav" id="main-nav"></nav>
    </div>
  </header>
  <main class="container">
    <div id="alert" class="alert hidden"></div>
    <div class="card hidden" id="admin-trainer-select">
      <h2>Selecteaza antrenorul (admin)</h2>
      <div class="form-group">
        <label>Antrenor</label>
        <select id="trainer_id"></select>
      </div>
    </div>
    <div class="card">
      <h2>Adauga interval</h2>
      <form id="interval-form">
        <div class="grid">
          <div class="form-group">
            <label>Ziua</label>
            <select id="day_of_week" required>
              <option value="1">Luni</option>
              <option value="2">Marti</option>
              <option value="3">Miercuri</option>
              <option value="4">Joi</option>
              <option value="5">Vineri</option>
              <option value="6">Sambata</option>
              <option value="0">Duminica</option>
            </select>
          </div>
          <div class="form-group">
            <label>Tip</label>
            <select id="type" required>
              <option value="fitness">Fitness</option>
              <option value="forta">Forta</option>
              <option value="kineto">Kineto</option>
            </select>
          </div>
          <div class="form-group">
            <label>Ora start</label>
            <input type="time" id="start_time" required value="08:00">
          </div>
          <div class="form-group">
            <label>Ora sfarsit</label>
            <input type="time" id="end_time" required value="12:00">
          </div>
          <div class="form-group">
            <label>Capacitate</label>
            <input type="number" id="capacity" value="10" min="1">
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Adauga in lista</button>
      </form>
    </div>
    <div class="card">
      <h2>Intervale de salvat</h2>
      <table>
        <thead>
          <tr><th>Zi</th><th>Interval</th><th>Tip</th><th>Capacitate</th><th></th></tr>
        </thead>
        <tbody id="pending-body"></tbody>
      </table>
      <button class="btn btn-success" id="btn-save-all" style="margin-top:1rem">Salveaza toate intervalele</button>
    </div>
    <div class="card">
      <h2>Intervale salvate</h2>
      <table>
        <thead>
          <tr><th>Zi</th><th>Interval</th><th>Tip</th><th>Capacitate</th></tr>
        </thead>
        <tbody id="saved-body"></tbody>
      </table>
    </div>
  </main>
  <script src="../js/api.js"></script>
  <script src="../js/trainer-intervals.js"></script>
</body>
</html>
